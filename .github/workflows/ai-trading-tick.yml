# Cron dimatiin (bukan dihapus) - logic trading udah dipindah ke bot VPS+MT5 (scripts/ai-tick.py).
# Kalau workflow ini masih jalan bareng bot VPS, dua-duanya baca-tulis dokumen Firestore yang sama
# tanpa transaction, resiko saling nimpa update. workflow_dispatch dibiarin buat manual-trigger kalau perlu.
name: Trading AI Auto Tick

on:
  workflow_dispatch: {}

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install firebase-admin
      - run: node scripts/ai-tick.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          AI_TARGET_UID: ${{ secrets.AI_TARGET_UID }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
